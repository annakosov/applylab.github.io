<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>Reflectance × Illumination Demo</title>

<style>

body{
font-family:sans-serif;
font-size:16pt;
margin:20px;
}

.row{
display:flex;
gap:40px;
margin-bottom:40px;
justify-content:center;
align-items:flex-start;
flex-wrap:nowrap; /* prevent stacking */
}

.panel{
display:flex;
flex-direction:column;
align-items:center;
flex:1;              /* share space evenly */
min-width:300;         /* allows shrinking */
max-width:750px;
}

canvas{
border:1px solid #777;
width:100%;      /* responsive width */
height:280px;    /* fixed height */
}

.patch{
width:90px;
height:90px;
border-radius:50%;
border:1px solid #777;
margin-top:10px;
background:black;
}

.title{
font-weight:bold;
margin-bottom:5px;
}

.half{
flex:0 0 calc(50% - 20px); /* match one of the top panels */
max-width:750px;
}

button{
margin-top:10px;
font-size:14pt;
}

</style>
</head>

<body>

<div class="row">

<div class="panel">
<div class="title">Illumination Spectrum</div>
<canvas id="illum"></canvas>
<div id="patchIllum" class="patch"></div>
<button onclick="clearSpec('illum')">Clear</button>
</div>

<div class="panel">
<div class="title">Reflectance Spectrum</div>
<canvas id="refl"></canvas>
<div id="patchRefl" class="patch"></div>
<button onclick="clearSpec('refl')">Clear</button>
</div>

</div>

<div class="row">

<div class="panel half">
<div class="title">Light from Surface</div>
<canvas id="result"></canvas>
<div id="patchResult" class="patch"></div>
</div>

</div>

<script>

const wlMin=380;
const wlMax=700;

let width, height, N;

const leftMargin=70;
const bottomMargin=55;

let wl=[];
let illumination=[];
let reflectance=[];
let result=[];

let canvases={
illum:document.getElementById("illum"),
refl:document.getElementById("refl"),
result:document.getElementById("result")
};

let ctx={
illum:canvases.illum.getContext("2d"),
refl:canvases.refl.getContext("2d"),
result:canvases.result.getContext("2d")
};

let mouseDown=false;

document.addEventListener("mousedown",()=>mouseDown=true);
document.addEventListener("mouseup",()=>mouseDown=false);

function resizeCanvas(canvas){
let rect = canvas.getBoundingClientRect();
canvas.width = rect.width;
canvas.height = rect.height;
}

function gauss(x,m,s){
let d=x-m;
return Math.exp(-(d*d)/(2*s*s));
}

let L=[],M=[],S=[];

function normalize(a){
let s=a.reduce((p,c)=>p+c,0);
for(let i=0;i<a.length;i++) a[i]/=s;
}

const Mmat=[
[4.4679,-3.5873,0.1193],
[-1.2186,2.3809,-0.1624],
[0.0497,-0.2439,1.2045]
];

function wavelengthToRGB(w){

let R=0,G=0,B=0;

if(w>=380 && w<440){R=-(w-440)/(440-380);B=1;}
else if(w<490){G=(w-440)/(490-440);B=1;}
else if(w<510){G=1;B=-(w-510)/(510-490);}
else if(w<580){R=(w-510)/(580-510);G=1;}
else if(w<645){R=1;G=-(w-645)/(645-580);}
else if(w<=700){R=1;}

let factor;

if(w<420) factor=0.3+0.7*(w-380)/(420-380);
else if(w>645) factor=0.3+0.7*(700-w)/(700-645);
else factor=1;

let gamma=0.8;

R=Math.pow(R*factor,gamma);
G=Math.pow(G*factor,gamma);
B=Math.pow(B*factor,gamma);

return [R,G,B];
}

function drawAxes(c,ylabel,w,h,localN){

c.strokeStyle="black";

c.beginPath();
c.moveTo(leftMargin,h-bottomMargin);
c.lineTo(w,h-bottomMargin);
c.stroke();

c.font="14pt sans-serif";
c.textAlign="center";

for(let wv=400;wv<=700;wv+=50){

let x = leftMargin + (wv-wlMin)/(wlMax-wlMin)*localN;
c.fillText(wv,x,h-bottomMargin+20);

}

c.fillText("Wavelength (nm)",leftMargin+localN/2,h-5);

c.save();
c.translate(25,h/2);
c.rotate(-Math.PI/2);
c.fillText(ylabel,0,0);
c.restore();
}

function drawSpectrum(type,array,ylabel){

let c = ctx[type];
let canvas = canvases[type];

let w = canvas.width;
let h = canvas.height;

let localN = w - leftMargin;

c.clearRect(0,0,w,h);

for(let i=0;i<localN;i++){

let idx = Math.floor(i * (N-1) / (localN-1)); // map to data

let val = array[idx];
let y = (h-bottomMargin)*(1-val);

let rgb = wavelengthToRGB(wl[idx]);

c.fillStyle = `rgb(${rgb[0]*255},${rgb[1]*255},${rgb[2]*255})`;
c.fillRect(i+leftMargin,y,1,(h-bottomMargin)-y);
}

drawAxes(c,ylabel,w,h,localN);
}

function updateColorPatch(spec,id){

let Lr=0,Mr=0,Sr=0;

for(let i=0;i<N;i++){
let v=spec[i];
Lr+=v*L[i];
Mr+=v*M[i];
Sr+=v*S[i];
}

let R = Mmat[0][0]*Lr + Mmat[0][1]*Mr + Mmat[0][2]*Sr;
let G = Mmat[1][0]*Lr + Mmat[1][1]*Mr + Mmat[1][2]*Sr;
let B = Mmat[2][0]*Lr + Mmat[2][1]*Mr + Mmat[2][2]*Sr;

R=Math.max(R,0);
G=Math.max(G,0);
B=Math.max(B,0);

let lum=Lr+Mr+Sr;
let maxv=Math.max(R,G,B);

if(maxv>0){
R/=maxv; G/=maxv; B/=maxv;
}

R*=lum; G*=lum; B*=lum;

R=Math.pow(R,0.5);
G=Math.pow(G,0.5);
B=Math.pow(B,0.5);

R=Math.min(R,1);
G=Math.min(G,1);
B=Math.min(B,1);

document.getElementById(id).style.background =
`rgb(${R*255},${G*255},${B*255})`;
}

function computeProduct(){

for(let i=0;i<N;i++)
result[i]=illumination[i]*reflectance[i];

drawSpectrum("result",result,"# of photons");

updateColorPatch(illumination,"patchIllum");
updateColorPatch(reflectance,"patchRefl");
updateColorPatch(result,"patchResult");
}

function redraw(){
drawSpectrum("illum",illumination,"# of photons");
drawSpectrum("refl",reflectance,"% photons reflected");
computeProduct();
}

function clearSpec(type){
if(type==="illum") illumination.fill(0);
if(type==="refl") reflectance.fill(0);
redraw();
}

function enableDrawing(canvas,array){

let lastX=null;

canvas.addEventListener("mousemove",e=>{

if(!mouseDown) return;

let rect = canvas.getBoundingClientRect();

let canvasX = (e.clientX - rect.left) - leftMargin;
let canvasY = e.clientY - rect.top;

let localN = canvas.width - leftMargin;

if(canvasX < 0 || canvasX >= localN) return;

/* map pixel → data index */
let x = Math.floor(canvasX * (N-1) / (localN-1));

let val = 1 - canvasY/(canvas.height - bottomMargin);
val = Math.max(0, Math.min(1, val));

if(lastX !== null){

let dx = x - lastX;

for(let k=1;k<=Math.abs(dx);k++){

let xi = lastX + Math.sign(dx)*k;
let t = k/Math.abs(dx);

let yi = array[lastX]*(1-t) + val*t;

if(xi>=0 && xi<N)
array[xi]=yi;

}

}

array[x]=val;
lastX=x;

redraw();

});

canvas.addEventListener("mouseleave",()=>lastX=null);
}

function resizeAll(){

/* resize canvases */
for(let key in canvases){
resizeCanvas(canvases[key]);
}

/* update dimensions */
width = canvases.illum.width;
height = canvases.illum.height;

N = Math.floor(width - leftMargin);

/* rebuild wavelength axis */
wl = [];
for(let i=0;i<N;i++){
wl[i] = wlMin + (wlMax-wlMin)*i/(N-1);
}

resizeInPlace(illumination, N);
resizeInPlace(reflectance, N);

/* keep result aligned */
result.length = N;
result.fill(0);

/* recompute cones */
L=[]; M=[]; S=[];

for(let i=0;i<N;i++){
let w=wl[i];
L[i]=gauss(w,564,40)+0.3*gauss(w,530,25);
M[i]=gauss(w,534,38);
S[i]=gauss(w,420,20);
}

normalize(L);
normalize(M);
normalize(S);

/* redraw everything */
redraw();
}
function resizeInPlace(arr, newN){

let old = arr.slice();

if(old.length === 0){
for(let i=0;i<newN;i++) arr[i] = 0;
return;
}

arr.length = newN;

for(let i=0;i<newN;i++){

let x = i*(old.length-1)/(newN-1);
let x0 = Math.floor(x);
let x1 = Math.min(x0+1, old.length-1);
let t = x - x0;

arr[i] = old[x0]*(1-t) + old[x1]*t;
}
}
/* enable drawing */
enableDrawing(canvases.illum,illumination);
enableDrawing(canvases.refl,reflectance);

/* resize handling */
window.addEventListener("resize", resizeAll);

/* initial draw */
resizeAll();

</script>

</body>
</html>
