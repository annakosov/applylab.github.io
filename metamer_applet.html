<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Metamer Spectrum Drawer</title>

<style>

body{
font-family:sans-serif;
font-size:18pt;
margin:20px;
}

.demo{
display:flex;
gap:40px;
margin-bottom:70px;
}

canvas{
border:1px solid #777;
}

.right{
display:flex;
flex-direction:column;
align-items:center;
width:260px;
}

.patchTitle{
margin-bottom:10px;
}

.patch{
width:160px;
height:160px;
border-radius:50%;
background:black;
border:1px solid #999;
margin-bottom:25px;
}

.bar{
width:160px;
height:22px;
background:#ddd;
margin:8px 0;
position:relative;
}

.fill{
height:100%;
width:0%;
}

.barLabel{
position:absolute;
left:-30px;
top:-2px;
font-size:18pt;
}

#rbar1,#rbar2{background:red}
#gbar1,#gbar2{background:green}
#bbar1,#bbar2{background:blue}

button{
font-size:18pt;
margin-top:20px;
padding:6px 14px;
}

</style>
</head>

<body>

<div class="demo">

<canvas id="spec1" width="720" height="360"></canvas>

<div class="right">

<div class="patchTitle">Predicted Color</div>
<div id="patch1" class="patch"></div>

<div class="bar"><span class="barLabel">L</span><div id="rbar1" class="fill"></div></div>
<div class="bar"><span class="barLabel">M</span><div id="gbar1" class="fill"></div></div>
<div class="bar"><span class="barLabel">S</span><div id="bbar1" class="fill"></div></div>

<button onclick="clearSpectrum(1)">Clear</button>

</div>
</div>


<div class="demo">

<canvas id="spec2" width="720" height="360"></canvas>

<div class="right">

<div class="patchTitle">Predicted Color</div>
<div id="patch2" class="patch"></div>

<div class="bar"><span class="barLabel">L</span><div id="rbar2" class="fill"></div></div>
<div class="bar"><span class="barLabel">M</span><div id="gbar2" class="fill"></div></div>
<div class="bar"><span class="barLabel">S</span><div id="bbar2" class="fill"></div></div>

<button onclick="clearSpectrum(2)">Clear</button>

</div>
</div>


<script>

const wlMin=380;
const wlMax=700;

const width=720;
const leftMargin=80;

let demos={};

initDemo(1);
initDemo(2);

function initDemo(id){

let canvas=document.getElementById("spec"+id);
let ctx=canvas.getContext("2d");

const H=canvas.height-60;
const N=width-leftMargin;

const plotTop=0;
const plotBottom=H;
const plotHeight=plotBottom-plotTop;

let spectrum=new Array(N).fill(0);

let wl=[];
for(let i=0;i<N;i++)
wl[i]=wlMin+(wlMax-wlMin)*i/(N-1);


function gauss(x,m,s){
let d=x-m;
return Math.exp(-0.5*(d*d)/(s*s));
}

let L=[],M=[],S=[];

for(let i=0;i<N;i++){

let w = wl[i];

let Lval = Math.exp(-0.5*Math.pow((w-564)/40,2));
let Mval = Math.exp(-0.5*Math.pow((w-534)/35,2));
let Sval = Math.exp(-0.5*Math.pow((w-420)/25,2));

// skew (important!)
Lval *= (1 + 0.1*(w-564)/100);
Mval *= (1 + 0.05*(w-534)/100);

// extra long-wavelength tail
if(w>620){
Lval *= 1 + 0.4*(w-620)/80;
}

// clamp negatives
if(Lval<0) Lval=0;
if(Mval<0) Mval=0;

L.push(Lval);
M.push(Mval);
S.push(Sval);

}

// normalize

let sumL=0,sumM=0,sumS=0;

for(let i=0;i<N;i++){
sumL+=L[i];
sumM+=M[i];
sumS+=S[i];
}

for(let i=0;i<N;i++){
L[i]/=sumL;
M[i]/=sumM;
S[i]/=sumS;
}

function wavelengthToRGB(w){

let r=0,g=0,b=0;

if(w<440){r=-(w-440)/(440-380);b=1;}
else if(w<490){g=(w-440)/(490-440);b=1;}
else if(w<510){g=1;b=-(w-510)/(510-490);}
else if(w<580){r=(w-510)/(580-510);g=1;}
else if(w<645){r=1;g=-(w-645)/(645-580);}
else{r=1;}

// edge intensity falloff
let factor;
//
if(w>700 || w<380)
factor=0;
else if(w>645)
factor=0.3+0.7*(700-w)/(700-645);
else if(w<420)
factor=0.3+0.7*(w-380)/(420-380);
else
factor=1;

return [r*factor,g*factor,b*factor];

}


function drawSpectrum(){

ctx.clearRect(0,0,width,canvas.height);

for(let i=0;i<N;i++){

let val=spectrum[i];
let y=plotTop+plotHeight*(1-val);

let rgb=wavelengthToRGB(wl[i]);

ctx.fillStyle=`rgb(${rgb[0]*255},${rgb[1]*255},${rgb[2]*255})`;

ctx.fillRect(i+leftMargin,y,1,plotBottom-y);

}

ctx.strokeStyle="black";
ctx.beginPath();
ctx.moveTo(leftMargin,plotBottom);
ctx.lineTo(width,plotBottom);
ctx.stroke();

ctx.save();

ctx.font="18pt sans-serif";
ctx.fillStyle="black";
ctx.textAlign="center";

for(let w=400;w<=700;w+=50){

let x=leftMargin+(w-380)/(700-380)*N;
ctx.fillText(w,x,plotBottom+25);

}

ctx.fillText("Wavelength (nm)",leftMargin+N/2,canvas.height-5);

ctx.restore();

ctx.save();

ctx.translate(30,plotTop+plotHeight/2);
ctx.rotate(-Math.PI/2);
ctx.textAlign="center";
ctx.font="18pt sans-serif";
ctx.fillStyle="black";
ctx.fillText("# photons",0,0);

ctx.restore();

computeColor();

}


function computeColor(){
// const dLambda = (wlMax - wlMin) / (N - 1);

let Lr=0,Mr=0,Sr=0;
let scaleFactor = 1.5//1.5
for(let i=0;i<N;i++){

let v=spectrum[i];

Lr+=v*L[i]*scaleFactor;
Mr+=v*M[i]*scaleFactor;
Sr+=v*S[i]*scaleFactor;

}

let LMS=[Lr,Mr,Sr];

let Mmat=[
[4.47,-3.59,0.12],
[-1.22,2.38,-0.16],
[0.06,-0.26,1.20]
];

let rgb = [0,0,0];

for(let i=0;i<3;i++)
for(let j=0;j<3;j++)
rgb[i] += Mmat[i][j]*LMS[j];

// clip negatives
rgb = rgb.map(v => Math.max(v,0));

// luminance
let lum = LMS[0] + LMS[1] + LMS[2];

// normalize by max channel
let m = Math.max(...rgb);
if(m>0)
rgb = rgb.map(v => v/m);

// scale by luminance
rgb = rgb.map(v => v*lum);

// gamma correction
// rgb = rgb.map(v => Math.sqrt(v));
rgb = rgb.map(v => Math.pow(v,1/2.2));
// clamp
rgb = rgb.map(v => Math.min(v,1));
updateUI([Lr,Mr,Sr],scaleFactor);

}


function updateUI(rgb,scaleFactor){

document.getElementById("patch"+id).style.background=
`rgb(${rgb[0]*255},${rgb[1]*255},${rgb[2]*255})`;
let rgbScaled = [0,0,0]
for(let i=0;i<3;i++){
  rgbScaled[i] = rgb[i]/scaleFactor
}

document.getElementById("rbar"+id).style.width=(rgbScaled[0]*100)+"%";
document.getElementById("gbar"+id).style.width=(rgbScaled[1]*100)+"%";
document.getElementById("bbar"+id).style.width=(rgbScaled[2]*100)+"%";

}


// drawing logic

let drawing=false;
let mouseDown=false;
let lastX=null;

document.addEventListener("mousedown",()=>{
mouseDown=true;
});

document.addEventListener("mouseup",()=>{
mouseDown=false;
drawing=false;
lastX=null;
});

canvas.addEventListener("mousemove",e=>{

if(!mouseDown) return;

drawing=true;
draw(e);

});


function draw(e){

  let rect = canvas.getBoundingClientRect();

  let scaleX = canvas.width / rect.width;
  let scaleY = canvas.height / rect.height;

  let x = Math.floor((e.clientX - rect.left) * scaleX - leftMargin);
  let y = (e.clientY - rect.top) * scaleY;

if(x<0||x>=N) return;

if(y<plotTop) y=plotTop;
if(y>plotBottom) y=plotBottom;

let val=1-(y-plotTop)/plotHeight;

val=Math.max(0,Math.min(1,val));

if(lastX!==null){

let dx=x-lastX;

for(let k=1;k<=Math.abs(dx);k++){

let xi=lastX+Math.sign(dx)*k;
let t=k/Math.abs(dx);

let yi=spectrum[lastX]*(1-t)+val*t;

if(xi>=0&&xi<N)
spectrum[xi]=yi;

}

}

spectrum[x]=val;
lastX=x;

drawSpectrum();

}

demos[id]={drawSpectrum,spectrum};

drawSpectrum();

}


function clearSpectrum(id){

demos[id].spectrum.fill(0);
demos[id].drawSpectrum();

}

</script>

</body>
</html>
